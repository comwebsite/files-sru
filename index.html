<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЗ-5 | Cypherion Core Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #030303;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .panel {
            background: #111;
            padding: 30px;
            border: 4px solid #330000;
            border-radius: 5px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 10px 30px rgba(255,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .button-container {
            position: relative;
            display: inline-block;
        }

        .az5-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #cc0000;
            border: 8px solid #550000;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            font-family: Impact, sans-serif;
            cursor: pointer;
            box-shadow: 
                inset -10px -10px 20px rgba(0,0,0,0.5),
                inset 10px 10px 20px rgba(255,255,255,0.3),
                0 15px 25px rgba(0,0,0,0.8);
            transition: background 0.1s;
            position: relative;
            z-index: 3;
        }

        .az5-btn:active, .az5-btn.active {
            background: #ff1a1a;
            border-color: #770000;
            box-shadow: 
                inset -5px -5px 10px rgba(0,0,0,0.8),
                inset 5px 5px 10px rgba(255,255,255,0.1),
                0 0 80px rgba(255, 0, 0, 0.8);
            transform: translateY(5px);
        }

        /* Визуальный индикатор ритма */
        .pulse-light {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        #oscilloscope {
            margin-top: 20px;
            background: #000;
            border: 2px solid #440000;
            width: 100%;
            height: 100px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1 id="status">СИСТЕМА ГОТОВА</h1>
        <div class="button-container">
            <div class="pulse-light" id="pulseLight"></div>
            <button class="az5-btn" id="az5">АЗ-5</button>
        </div>
        <canvas id="oscilloscope"></canvas>
    </div>

    <script>
        let audioCtx;
        let masterGain;
        let isPlaying = false;
        let analyser;

        const canvas = document.getElementById('oscilloscope');
        const canvasCtx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 100;

        function initAudioEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Главный выход
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0; // Изначально тишина

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.1; // Никакого сглаживания (чтобы не слипалось)

            // 1. СОЗДАЕМ ИДЕАЛЬНЫЙ ПРЕРЫВАТЕЛЬ (Абсолютный Гейт 0 -> 1)
            const gateGain = audioCtx.createGain();
            gateGain.gain.value = 0.5; // Базовая точка

            const lfo = audioCtx.createOscillator();
            lfo.type = 'square';
            lfo.frequency.value = 3.03; // Ровно 330 миллисекунд (3.03 Гц)

            const lfoScale = audioCtx.createGain();
            lfoScale.gain.value = 0.5; // Умножаем амплитуду: от -1..1 до -0.5..0.5

            lfo.connect(lfoScale);
            lfoScale.connect(gateGain.gain); 
            // Итог: 0.5 + (-0.5) = 0 (Мертвая тишина)
            // Итог: 0.5 + (+0.5) = 1 (Максимальный звук)
            lfo.start();

            // 2. ДИСТОРШН (Искажение для киношного эффекта)
            const distortion = audioCtx.createWaveShaper();
            distortion.curve = new Float32Array([-1, -0.8, -0.5, 0, 0.5, 0.8, 1]); // Жесткий обрез
            distortion.oversample = '4x';

            // Маршрутизация: Сигнал -> Гейт (Прерыватель) -> Дисторшн -> Мастер -> Анализатор -> Динамики
            gateGain.connect(distortion);
            distortion.connect(masterGain);
            masterGain.connect(analyser);
            analyser.connect(audioCtx.destination);

            // 3. ГЕНЕРАЦИЯ ТОНОВ (Тот самый аккорд сирены)
            const freqs = [
                { f: 450, t: 'square', v: 1.0 },   // Основной резкий тон
                { f: 650, t: 'sawtooth', v: 0.8 }, // Диссонанс (эффект тревоги)
                { f: 1200, t: 'square', v: 0.4 },  // Металлическое лязганье
                { f: 50, t: 'triangle', v: 1.5 }   // Глубокий электрический гул трансформатора
            ];

            freqs.forEach(config => {
                const osc = audioCtx.createOscillator();
                osc.type = config.t;
                osc.frequency.value = config.f;
                
                const gain = audioCtx.createGain();
                gain.gain.value = config.v;
                
                osc.connect(gain);
                gain.connect(gateGain); // Подключаем к прерывателю
                osc.start();
            });

            drawOscilloscope();
        }

        // Отрисовка волны (жесткая линия без размытия)
        function drawOscilloscope() {
            requestAnimationFrame(drawOscilloscope);
            if (!analyser) return;

            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);

            canvasCtx.fillStyle = '#000';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = isPlaying ? '#ff0000' : '#330000';
            canvasCtx.beginPath();

            const sliceWidth = canvas.width / data.length;
            let x = 0;

            for (let i = 0; i < data.length; i++) {
                const v = data[i] / 128.0;
                const y = v * canvas.height / 2;
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
        }

        const btn = document.getElementById('az5');
        const statusText = document.getElementById('status');
        const pulseLight = document.getElementById('pulseLight');

        btn.addEventListener('mousedown', () => {
            if (!audioCtx) initAudioEngine();
            
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                // АКТИВАЦИЯ
                masterGain.gain.setValueAtTime(1, audioCtx.currentTime); // Мгновенный старт
                statusText.innerText = "АВАРИЯ: СТЕРЖНИ В ЗОНЕ";
                btn.classList.add('active');
                
                // GSAP Анимация вспышки света (синхронно с 330мс / 3.03Hz)
                // 1 / 3.03 = 0.33 сек (полный цикл). Половина цикла = 0.165 сек
                gsap.to(pulseLight, {
                    opacity: 1,
                    duration: 0.165,
                    repeat: -1,
                    yoyo: true,
                    ease: "steps(1)" // Резкое переключение как у лампы накаливания
                });

            } else {
                // ОТКЛЮЧЕНИЕ
                masterGain.gain.setValueAtTime(0, audioCtx.currentTime); // Мгновенный сброс в тишину (никакого эха)
                statusText.innerText = "СИСТЕМА ГОТОВА";
                btn.classList.remove('active');
                
                gsap.killTweensOf(pulseLight);
                gsap.set(pulseLight, { opacity: 0 });
            }
        });

        // Поддержка сенсорных экранов
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            btn.dispatchEvent(new Event('mousedown'));
        });
    </script>
</body>
</html>
