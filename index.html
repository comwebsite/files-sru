        let currentYear = null;

        function getYears() {
            return Object.keys(data).map(Number).sort((a, b) => a - b);
        }

        function getCelebritiesByYear(year) {
            const yearData = data[year];
            if (typeof yearData === 'object' && !yearData.name) {
                return Object.entries(yearData).map(([city, info]) => ({
                    name: info.name,
                    city,
                    ...info
                }));
            }
            return [{ ...yearData, city: yearData.city }];
        }

        function renderYears() {
            const yearList = document.getElementById('yearList');
            getYears().forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'year-btn';
                btn.textContent = year;
                btn.onclick = () => selectYear(year);
                yearList.appendChild(btn);
            });
        }

            celebrities.forEach((celeb, idx) => {
                const item = document.createElement('div');
                item.className = 'celebrity-item';
                item.textContent = celeb.name;
                item.onclick = () => selectCelebrity(year, idx);
                celebrityList.appendChild(item);
            });
        }

        function selectYear(year) {
            currentYear = year;
            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === String(year));
            });
            renderCelebrities(year);
            renderDocument(year, 0);
        }

        function selectCelebrity(year, idx) {
            renderDocument(year, idx);
            document.querySelectorAll('.celebrity-item').forEach((item, i) => {
                item.classList.toggle('active', i === idx);
            });
        }

        function renderDocument(year, idx) {
            const yearData = data[year];
            let celeb;
            if (typeof yearData === 'object' && !yearData.name) {
                celeb = Object.entries(yearData)[idx][1];
            } else {
                celeb = yearData;
            }
            
            const container = document.getElementById('documentsContainer');
            const caseId = `СРУ-${year}-${String(idx + 1).padStart(3, '0')}`;
            const currentDate = new Date().toLocaleDateString('ru-RU', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            container.innerHTML = `
                <div class="document">
                    <div class="doc-header">
                        <div class="doc-stamps">
                            <div class="doc-stamp">РАССЕКРЕЧЕНО</div>
                            <div class="doc-stamp">ФАЙЛЫ С.Р.У.</div>
                        </div>
                        <div class="doc-title">${celeb.name}</div>
                        <div class="doc-location">${celeb.city || ''}, ${celeb.country || ''}</div>
                        <div class="doc-meta">
                            <div class="doc-meta-item">
                                <div class="doc-meta-label">ID дела</div>
                                <div class="doc-meta-value">${caseId}</div>
                            </div>
                            <div class="doc-meta-item">
                                <div class="doc-meta-label">Дата взаимодействия</div>
                                <div class="doc-meta-value">${year}</div>
                            </div>
                            <div class="doc-meta-item">
                                <div class="doc-meta-label">Уровень допуска</div>
                                <div class="doc-meta-value">СЕКРЕТНО</div>
                            </div>
                            <div class="doc-meta-item">
                                <div class="doc-meta-label">Статус</div>
                                <div class="doc-meta-value">ЗАВЕРШЕНО</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="doc-body">
                        <p>${celeb.details}</p>
                    </div>
                    
                    <div class="doc-footer">
                        <div class="doc-footer-label">Дата просмотра: ${currentDate}</div>
                        <div class="signature-block">
                            <div class="doc-footer-label">Подпись</div>
                            <div class="signature-line"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        renderYears();
        selectYear(2020);
    </script>
</body>
</html>
